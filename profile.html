<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vaš profil</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f8f8;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .profile-container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .profile-initial {
      width: 60px;
      height: 60px;
      background-color: lightgoldenrodyellow;
      color: grey;
      font-size: 28px;
      font-weight: bold;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
    }

    .profile-info p {
      font-size: 16px;
      color: #444;
      margin: 10px 0;
    }

    .profile-info label {
      font-weight: bold;
    }

    .edit-btn, .home-btn {
      display: inline-block;
      text-decoration: none;
      margin-top: 10px;
      padding: 8px 16px;
      background-color: goldenrod;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 141px;
    }

    .edit-btn:hover, .home-btn:hover {
      background-color: #daa520;
    }
  </style>
<body>

<div class="profile-container">
  <div class="profile-initial" id="profile-initial">U</div>

  <div class="profile-info">
    <p><label>Ime:</label> <span id="user-name"></span></p>
    <p><label>Email:</label> <span id="user-email"></span></p>
    <p><label>Starost računa:</label> <span id="account-age"></span></p>
    <p><label>Bodovi:</label> <span id="user-points"></span></p>
  </div>

  <!-- Buttons -->
  <a href="changeprofile.html" class="edit-btn">Uredi profil</a>
  <br/>
  <a href="index.html" class="home-btn">Vrati se</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = "https://zflomxninkvluwnepwfd.supabase.co";
  const supabaseKey = "sb_publishable_FUPjxd0xSVjMbVqzXm-k6w_gfCxLWCC";
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadProfile() {
    const { data: { user } } = await supabase.auth.getUser();

    if (!user) {
      alert("Niste prijavljeni!");
      window.location.href = "login.html";
      return;
    }

    // Fetch profile from "profiles" table
    const { data: profile, error } = await supabase
      .from("profiles")
      .select("*")
      .eq("id", user.id)
      .single();

    if (error) {
      console.error(error);
      return;
    }

    // Fill in profile data
    document.getElementById("profile-initial").textContent =
      profile.username.charAt(0).toUpperCase();
    document.getElementById("user-name").textContent = profile.username;
    document.getElementById("user-email").textContent = user.email;
    document.getElementById("user-points").textContent = profile.points;

    // Calculate account age
    const joinedDate = new Date(user.created_at);
    const daysSince = Math.floor((new Date() - joinedDate) / (1000*60*60*24));
    document.getElementById("account-age").textContent =
      daysSince < 30 ? daysSince + " dana" : Math.floor(daysSince/30) + " mjeseci";
  }

  loadProfile();
</script>

</body>
