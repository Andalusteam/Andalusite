<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grafikon</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Remove default margin/padding and prevent scrolling inside iframe */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background-color: #1e1e1e;
      font-family: 'Segoe UI', sans-serif;
      color: #ffa500;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chart-box {
      width: 660px;
      height: 400px;
      padding: 20px;
      background-color: #2b2b2b;
      border-radius: 18px;
      border: 2px solid #ffa500;
      box-shadow: 0 0 20px #000;
      box-sizing: border-box;
    }

    canvas {
      width: 100% !important;
      height: 355px !important;
      display: block;
    }
  </style>
</head>
<body>
  <div class="chart-box">
    <canvas id="gaohChart"></canvas>
  </div>

<script>
const ctx = document.getElementById('gaohChart').getContext('2d');

/* ===== LAST 10 DAYS (TODAY ON RIGHT) ===== */
const now = new Date();

function formatDay(date) {
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' }); // e.g. 04/02
}

function toKey(date) {
  return date.toISOString().slice(0, 10); // YYYY-MM-DD
}

const days = [];
for (let i = 9; i >= 0; i--) {
  const d = new Date(now);
  d.setDate(now.getDate() - i);
  days.push(d);
}

const labels = days.map(d => formatDay(d));

/* ===== REAL DAILY POINTS (REPLACE WITH YOUR BACKEND DATA) ===== */
const pointsPerDay = {
  "2026-01-26": 120,
  "2026-01-27": 80,
  "2026-01-28": 200,
  "2026-01-29": 150,
  "2026-01-30": 90,
  "2026-01-31": 300,
  "2026-02-01": 50,
  "2026-02-02": 220,
  "2026-02-03": 400,
  "2026-02-04": 180
};

const pointsData = days.map(d => {
  const key = toKey(d);
  return pointsPerDay[key] || 0;
});

/* ===== CHART ===== */
new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'Prikupljeni bodovi (po danu)',
        data: pointsData,
        borderColor: '#32cd32',
        backgroundColor: 'rgba(50,205,50,0.1)',
        tension: 0.3,
        yAxisID: 'yRight',
        pointRadius: 4
      }
    ]
  },
  options: {
    responsive: false,
    animation: false,
    scales: {
      x: {
        ticks: {
          color: '#aaa',
          maxRotation: 0, // no tilt
          minRotation: 0
        },
        grid: { color: '#333' }
      },
      yRight: {
        position: 'right',
        beginAtZero: true,
        ticks: {
          stepSize: 50,
          color: 'lightgrey'
        },
        title: {
          display: true,
          text: 'Prikupljeni bodovi',
          color: '#32cd32'
        }
      }
    },
    plugins: {
      legend: {
        labels: { color: '#32cd32' }
      }
    }
  }
});
</script>


</body>
</html>
