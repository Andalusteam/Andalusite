<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prijavite se</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    .login-box {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .login-box h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background-color: goldenrod;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-box button:hover {
      background-color: #daa520;
    }

    .signup-link {
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }

    .signup-link a {
      color: goldenrod;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .imageza{
      width: 16%;
      padding: 10px;
     
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: none;
      margin-top: 10px;
    }

body {
  max-width: 1600px;
  margin: 0 auto;
}

  </style>
</head>
<body>

<img src="imageza.png" alt="Design1 Idea" class="imageza" />

<div class="login-box">
  <h2>Prijavite se</h2>
  <form id="login-form">
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="submit">Prijavite se</button>
  </form>

  <div class="signup-link">
    Nemaš račun? <a href="signup.html">Stvori jedan</a>
  </div>
  <p id="login-message" style="color:red; margin-top:10px;"></p>
</div>

<!-- Supabase library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = "https://zflomxninkvluwnepwfd.supabase.co";
  const supabaseKey = "sb_publishable_FUPjxd0xSVjMbVqzXm-k6w_gfCxLWCC";
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  const loginForm = document.getElementById("login-form");
  const emailInput = document.getElementById("login-email");
  const passwordInput = document.getElementById("login-password");
  const loginMessage = document.getElementById("login-message");

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = emailInput.value;
    const password = passwordInput.value;

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      loginMessage.textContent = error.message;
    } else {
      // Save user to localStorage to use on homepage/profile
      localStorage.setItem("currentUser", JSON.stringify(data.user));
      // Redirect to homepage
      window.location.href = "index.html";
    }
  });
</script>

</body>
</html>
