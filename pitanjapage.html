<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pitanja</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: white;
      color: #333;
    }

    header {
      background-color: white;
      text-align: center;
      padding: 25px 7px 7px;
    }

    h1 {
      font-size: 32px;
      color: goldenrod;
      text-shadow: 1px 1px 2px #ccc, 2px 2px 4px rgba(218, 165, 32, 0.3);
      margin: 0;
    }

    .content {
      text-align: center;
      padding: 40px 20px;
      font-size: 25px;
      color: #555;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 24px;
      color: #999;
      background-color: #f5f5f5;
    }

    .question-lines {
      margin-top: 12px;
      width: 180%;
      max-width: 900px;
      margin-left: auto;     
      margin-right: auto;    
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 32px;
      background-color: #fff;
      box-shadow: 1px 1px 5px rgba(0,0,0,0.1);
    }

    .question-lines .line {
      border-bottom: 1px dashed #aaa;
      padding: 6px 0;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Andalus overlay */
    .andalus-title {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: bold;
      color: goldenrod;
      opacity: 0.25; /* transparent effect */
      pointer-events: none;
      white-space: nowrap;
      z-index: 0;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: lightgray;
      text-align: center;
      font-size: 14px;
      padding: 8px 0;
      color: #555;
      border-top: 1px solid #ccc;
      z-index: 999;
    }

    .info-message {
      text-align: center;
      font-size: 18px;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      margin-top: 0px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .info-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .info-image {
      width: 200px;
      height: 195px;
    }

    .leaderboard {
      position: absolute;
      top: 45px;
      left: 60px;
      width:250px;
      background-color: #fff;
      border: 2px grey;
      border-radius: 12px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      z-index: 1000;
    }

    .leaderboard h3 {
      font-size: 18px;
      margin-bottom: 12px;
      color: goldenrod;
      text-align: center;
    }

    .leaderboard ol {
      list-style: decimal inside;
      margin: 0;
      padding: 0;
    }

    .leaderboard li {
      font-size: 14px;
      padding: 4px 0;
      color: #444;
    }

    /* Answer button styling */
    .answer-btn {
      background-color: goldenrod;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background-color 0.3s;
      margin-left: 10px;
    }

    .answer-btn:hover {
      background-color: #daa520;
    }
    .delete-btn {
  float: right; /* moves delete button to the right of the question */
  background-color: red;
  color: white;
  border: none;
  padding: 2px 6px;
  margin-left: 5px;
  cursor: pointer;
}
.question-wrapper {
  display: flex;
  align-items: center;
  justify-content: space-between; /* question left, delete right */
  margin-bottom: 6px;
  padding: 4px;
}

.line {
  flex-grow: 1;
}

.delete-btn {
  margin-left: 10px;
  background-color: red;
  color: white;
  border: none;
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 4px;
}
.reward-popup {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: bold;
  color: goldenrod;
  font-size: 14px;
  margin-left: 8px;
  opacity: 1;
  transition: opacity 1.5s ease-out, transform 1.5s ease-out;
}

.reward-popup img {
  width: 62px;
  height: 62px;
}
.answer-inline {
  display: inline-block;
  margin-left: 8px;
  max-width: 80%;          /* keep it within question container */
  word-wrap: break-word;
  white-space: normal;
  vertical-align: top;
  line-height: 1.4em;
}
.line {
  display: flex;
  flex-direction: column; /* stack question and answers vertically */
  align-items: flex-start;
  margin-bottom: 10px;
}

.question-text {
  font-weight: bold;
  margin-bottom: 4px;
  word-wrap: break-word;
  white-space: normal;
}

.answer-inline {
  color: green;
  word-wrap: break-word;
  white-space: normal;
  max-width: 100%;  /* stay within container */
  line-height: 1.4em;
}

body {
  max-width: 1600px;
  margin: 0 auto;
}

/* =============================== */
/* 📱 PHONE MEDIA QUERY (≤ 600px) */
/* =============================== */
@media (max-width: 1000px) {

body {
  overflow-x: hidden;
}

  /* Header */
  header {
    padding: 20px 10px 10px;
  }

  h1 {
    font-size: 26px;
  }

  /* Main content text */
  .content {
    padding: 25px 15px;
    font-size: 18px;
  }

  /* Remove huge width */
  .question-lines {
    width: 95%;
    max-width: 95%;
    padding: 16px;
    margin-top: 20px;
  }

  /* Each question block */
  .question-wrapper {
    flex-direction: column;
    align-items: flex-start;
    padding: 6px 0;
  }

  .line {
    width: 100%;
    margin-bottom: 8px;
  }

  .question-text {
    font-size: 16px;
    margin-bottom: 6px;
  }

  .answer-inline {
    font-size: 15px;
    margin-left: 0;
    margin-top: 4px;
    max-width: 100%;
  }

  /* Buttons */
  .answer-btn {
    font-size: 12px;
    padding: 5px 10px;
    margin-top: 6px;
    margin-left: 0;
  }

  .delete-btn {
    font-size: 12px;
    padding: 4px 6px;
    margin-top: 6px;
  }

  /* Reward popup */
  .reward-popup {
    font-size: 13px;
    margin-top: 6px;
  }

  .reward-popup img {
    width: 40px;
    height: 40px;
  }

  /* Info container */
  .info-container {
    flex-direction: column;
    gap: 15px;
    padding: 15px;
  }

  .info-image {
    width: 150px;
    height: auto;
  }

  .info-message {
    font-size: 16px;
    margin-bottom: 15px;
  }

  /* Leaderboard becomes normal block */
  .leaderboard {
    position: static;
    width: 90%;
    margin: 20px auto;
    padding: 16px;
    margin-bottom: 60px;

  }

  .leaderboard h3 {
    font-size: 16px;
  }

  .leaderboard li {
    font-size: 13px;
  }

  /* Andalus background text */
  .andalus-title {
    font-size: 42px;
    top: 40%;
    opacity: 0.15;
  }

  /* Footer */
  footer {
    font-size: 12px;
    padding: 6px 0;
  }

}

  </style>
</head>
<body>

<div class="leaderboard">
  <h3>Top odgovarači</h3>
  <ol id="leaderboard-list">
    <li><em>Učitavanje...</em></li>
  </ol>
</div>

<header>
  <img src="Screenshot_68-.png" alt="Coins" class="info-image" />
  <div>
    Ovdje su sva postavljena pitanja na stranici... <br>
    <strong>Odgovori na pitanja i prikupi kovanice.</strong>
  </div>
</header>

<div class="question-box-scrollable">
  <div class="andalus-title">Andaluz</div> <!-- ✨ Goldenrod overlay -->
<div class="question-lines" id="questions-list">
  <!-- Pitanja će se puniti ovdje -->
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ================== SUPABASE CLIENT SETUP ==================
  const supabaseUrl = "https://zflomxninkvluwnepwfd.supabase.co";
  const supabaseKey = "sb_publishable_FUPjxd0xSVjMbVqzXm-k6w_gfCxLWCC";
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // ================== LOGGED-IN USER ==================
  let currentUser = null;
  const isAdmin = true; // you can adjust dynamically

  async function checkUser() {
    const { data: { user } } = await supabase.auth.getUser();
    currentUser = user;
  }

  checkUser();

  // ================== FETCH QUESTIONS + ANSWERS ==================
  async function fetchQuestions() {
    const { data: questions, error: qError } = await supabase
      .from('questions')
      .select('id, question, user_id, created_at')
      .order('created_at', { ascending: false });

    if (qError) {
      console.error(qError);
      return [];
    }

    const { data: answers, error: aError } = await supabase
      .from('answers')
      .select('id, question_id, user_id, answer, created_at');

    if (aError) {
      console.error(aError);
      return questions.map(q => ({ ...q, answers: [] }));
    }

    // Combine questions + answers
    return questions.map(q => ({
      ...q,
      answers: answers.filter(a => a.question_id === q.id)
    }));
  }

  const qList = document.getElementById("questions-list");

  async function renderQuestions() {
    const questions = await fetchQuestions();
    qList.innerHTML = "";

    if (!questions.length) {
      qList.innerHTML = "<p><em>Nema još postavljenih pitanja.</em></p>";
      return;
    }

    questions.forEach(qObj => {
      const wrapper = document.createElement("div");
      wrapper.className = "question-wrapper";

      const div = document.createElement("div");
      div.className = "line";

      // QUESTION TEXT
      const text = document.createElement("div");
      text.className = "question-text";
      text.textContent = qObj.question;
      div.appendChild(text);

      // ANSWERS
      if (qObj.answers.length) {
        const ansDiv = document.createElement("div");
        ansDiv.className = "answer-inline";
        ansDiv.textContent = "Odgovori: ";

        qObj.answers.forEach(ansObj => {
          const ansWrapper = document.createElement("span");
          ansWrapper.style.display = "inline-flex";
          ansWrapper.style.alignItems = "center";
          ansWrapper.style.gap = "4px";

          // Coin if answer belongs to current user
          if (currentUser && ansObj.user_id === currentUser.id) {
            const coin = document.createElement("img");
            coin.src = "d3iza1j7n.png";
            coin.style.width = "41px";
            coin.style.height = "41px";
            ansWrapper.appendChild(coin);
          }

          const ansEl = document.createElement("span");
          ansEl.textContent = ansObj.answer;
          if (currentUser && ansObj.user_id === currentUser.id) {
            ansEl.style.color = "green";
            ansEl.style.fontWeight = "bold";
          }
          ansWrapper.appendChild(ansEl);

          // DELETE ANSWER button (owner or admin)
          if ((currentUser && ansObj.user_id === currentUser.id) || isAdmin) {
            const delAns = document.createElement("button");
            delAns.textContent = "Obriši odgovor";
            delAns.style.fontSize = "11px";
            delAns.onclick = async () => {
              if (!confirm("Obrisati ovaj odgovor?")) return;
              await supabase.from('answers').delete().eq('id', ansObj.id);
              renderQuestions();
            };
            ansWrapper.appendChild(delAns);
          }

          ansDiv.appendChild(ansWrapper);
          ansDiv.appendChild(document.createTextNode(", "));
        });

        div.appendChild(ansDiv);
      }

      // ANSWER BUTTON
      const answerBtn = document.createElement("button");
      answerBtn.className = "answer-btn";
      answerBtn.textContent = "Odgovori";
      answerBtn.onclick = () => {
        answerBtn.style.display = "none";

        const input = document.createElement("input");
        input.type = "text";
        input.className = "answer-input";
        input.placeholder = "Upiši odgovor ovdje...";

        const sendBtn = document.createElement("button");
        sendBtn.textContent = "Pošalji";
        sendBtn.onclick = async () => {
          const val = input.value.trim();
          if (!val) return;
          if (!currentUser) {
            alert("Morate biti prijavljeni za odgovor.");
            return;
          }

          await supabase.from('answers').insert([{
            question_id: qObj.id,
            user_id: currentUser.id,
            answer: val
          }]);
          renderQuestions();
        };

        const cancelBtn = document.createElement("button");
        cancelBtn.textContent = "Odustani";
        cancelBtn.onclick = () => {
          input.remove();
          sendBtn.remove();
          cancelBtn.remove();
          answerBtn.style.display = "inline-block";
        };

        div.appendChild(input);
        div.appendChild(sendBtn);
        div.appendChild(cancelBtn);
      };

      div.appendChild(answerBtn);
      wrapper.appendChild(div);

      // DELETE QUESTION (owner or admin)
      if ((currentUser && qObj.user_id === currentUser.id) || isAdmin) {
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "Obriši pitanje";
        deleteBtn.onclick = async () => {
          if (!confirm("Jeste li sigurni da želite obrisati ovo pitanje?")) return;
          await supabase.from('answers').delete().eq('question_id', qObj.id);
          await supabase.from('questions').delete().eq('id', qObj.id);
          renderQuestions();
        };
        wrapper.appendChild(deleteBtn);
      }

      qList.appendChild(wrapper);
    });
  }

  renderQuestions();
</script>
